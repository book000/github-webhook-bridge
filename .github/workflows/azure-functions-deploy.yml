name: Deploy to Azure Functions

on:
  push:
    branches:
      - master
  workflow_dispatch:

concurrency:
  group: azure-deploy
  cancel-in-progress: true

permissions: {}

env:
  DOTNET_VERSION: "10.0.x"
  PUBLISH_OUTPUT_DIR: ./output

jobs:
  deploy:
    name: Deploy
    runs-on: ubuntu-latest

    environment: production

    permissions:
      id-token: write
      contents: read

    steps:
      - name: 🛎 Checkout
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - name: 🔑 Login to Azure (OIDC)
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: 🏗 Setup .NET SDK
        uses: actions/setup-dotnet@26b0ec14cb23fa6904739307f278c14f94c95bf1 # v5
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}
          cache: true
          cache-dependency-path: "**/*.csproj"

      - name: 📦 Restore dependencies
        run: dotnet restore src/GitHubWebhookBridge.csproj

      - name: 🏗 Publish
        run: dotnet publish src/GitHubWebhookBridge.csproj --configuration Release --no-restore --output ${{ env.PUBLISH_OUTPUT_DIR }}

      - name: 🚀 Deploy to Azure Functions
        uses: Azure/functions-action@bc63708cc6539760eea18d8a7de4ce8ef5fdf593 # v1
        with:
          app-name: ${{ secrets.AZURE_FUNCTIONAPP_NAME }}
          package: ${{ env.PUBLISH_OUTPUT_DIR }}
          scm-do-build-during-deployment: false

