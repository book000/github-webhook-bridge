name: Check using src-import

on:
  pull_request:
    branches:
      - main
      - master

# ワークフロー全体のデフォルト権限を無効化（各ジョブで最小権限を明示する）
permissions: {}

concurrency:
  # pull_request_target との二重発火を防ぐため event_name を含める
  group: ${{ github.workflow }}-${{ github.event_name }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  check-import:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read # reviewdog の PR diff 取得に必要

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup reviewdog
        uses: reviewdog/action-setup@v1

      - name: Check using src-import
        run: |
          COUNT=`grep -rEn "from 'src/" --include=*.ts src | tee ../import-src.txt | wc -l || true`
          echo count: $COUNT
          cat ../import-src.txt
          cat ../import-src.txt | reviewdog -efm="%f:%l:%m" -name="Check using src-import" -reporter=github-annotations -level=warning
          if [ "$COUNT" != "0" ]; then
            echo "Found src-import in $COUNT files"
            exit 1
          fi
        env:
          # github-annotations は diff 生成のみにトークンを使用し、書き込みは行わない
          # フォーク PR での読み取り専用 GITHUB_TOKEN でも動作する
          REVIEWDOG_GITHUB_API_TOKEN: ${{ secrets.GITHUB_TOKEN }}
